<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cash Control - Acesso</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login login-body">

<div class="auth-box">

  <img src="/logo.png" class="login-logo">
  <h2 id="formTitle">Entrar</h2>

  <form id="authForm">

    <input type="text" id="nome" placeholder="Nome" style="display:none;">

    <input type="email" id="email" placeholder="Email" required>

    <div class="input-senha">
      <input type="password" id="senha" placeholder="Senha" required>
      <span class="toggleSenha">Mostrar</span>
    </div>

    <div class="input-senha" id="confirmarSenhaBox" style="display:none;">
      <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
      <span class="toggleSenha">Mostrar</span>
    </div>
<div class="remember">
  <input type="checkbox" id="lembrar">
  <label for="lembrar">Lembrar de mim</label>
</div>
    <button type="submit" id="submitBtn">Entrar</button>
  </form>

  <p class="switch-text">
    <span id="toggleMode">Criar conta</span>
  </p>

  <p class="switch-text">
    <span id="forgotPassword">Esqueci minha senha</span>
  </p>

</div>

<div id="modalPadrao" class="modal">
  <div class="modal-box">
    <h3 id="modalTitulo"></h3>
    <p id="modalTexto"></p>
    <input id="modalInput" style="display:none;" />
    <div class="modal-botoes">
      <button id="modalCancelar">Cancelar</button>
      <button id="modalOk">OK</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
